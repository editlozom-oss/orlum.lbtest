<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORLUME.LB | CRAFTED TO BE KEPT</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Thmanyah (ثمانية) Arabic Font -->
    <link href="https://fonts.cdnfonts.com/css/thamanya" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --dark: #1a3c4a; 
            --cream: #e1dccd; 
            --accent: #c4a97a; 
            --text-dark: #1a1a1a;
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'DM Sans', sans-serif;
            --font-arabic: 'Thamanya', serif;
            --nav-h: 100px;
            --shadow-float: 0 15px 35px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.15);
            --shadow-pressed: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            color: var(--text-dark);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(225, 220, 205, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid rgba(26, 60, 74, 0.1);
        }

        .logo-wrapper { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 60px; width: auto; object-fit: contain; }
        .logo-main { font-family: var(--font-serif); font-size: clamp(18px, 4vw, 26px); font-weight: 600; color: var(--dark); letter-spacing: 0.05em; line-height: 1; }
        .logo-sub { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent); margin-top: 4px; font-weight: 500; }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .social-icons a { color: var(--dark); font-size: 22px; transition: 0.3s; }

        .lang-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- HERO --- */
        section { padding: 140px 5% 60px; max-width: 1400px; margin: 0 auto; }
        .hero-title { font-family: var(--font-serif); font-size: clamp(34px, 8vw, 80px); line-height: 1.1; color: var(--dark); margin-bottom: 40px; text-align: left; }
        
        .main-image-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            cursor: pointer; 
            overflow: hidden; 
            box-shadow: var(--shadow-float);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
            border-radius: 2px;
        }

        /* --- PRODUCTS GRID --- */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            margin-top: 50px;
        }
        
        .work-card { 
            background: white; 
            padding-bottom: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            transition: 0.3s ease;
        }

        .work-img-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            cursor: pointer; 
            box-shadow: var(--shadow-float);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }

        /* INTERACTIONS */
        .main-image-container:hover, .work-img-box:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .main-image-container:active, .work-img-box:active {
            transform: translateY(-2px) scale(0.98);
            box-shadow: var(--shadow-pressed);
        }

        .main-image-container img, .work-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .main-image-container:hover img, .work-img-box:hover img { transform: scale(1.04); }
        
        .work-info { padding: 20px 15px; text-align: center; }
        .work-title { font-family: var(--font-serif); font-size: 20px; margin-bottom: 12px; color: var(--dark); }

        .order-options label { font-size: 10px; text-transform: uppercase; color: #999; display: block; margin-bottom: 8px; }
        .order-options select { 
            background: #f9f9f9; 
            border: 1px solid #eee; 
            padding: 8px; 
            font-size: 12px; 
            width: 100%;
            margin-bottom: 20px;
        }

        .order-btn {
            display: block;
            text-decoration: none;
            color: white;
            background: var(--dark);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 12px;
            transition: 0.3s;
        }

        /* --- LIGHTBOX --- */
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 85vh; }
        #lightbox-close { position: absolute; top: 20px; right: 25px; color: white; font-size: 40px; cursor: pointer; }

        /* --- FOOTER --- */
        footer { padding: 60px 5% 40px; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); }
        .footer-logo { height: 45px; margin-bottom: 20px; opacity: 0.7; }
        .rights-text { font-size: 9px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            :root { --nav-h: 80px; }
            section { padding-top: 110px; }
            
            .hero-title { text-align: center; }
            
            .grid-container { 
                grid-template-columns: 1fr; /* Stack cards on mobile */
                gap: 40px;
            }

            .main-image-container { aspect-ratio: 4/5; } /* Taller hero for mobile screens */
            
            .logo-text { display: none; } /* Focus on the brand icon for mobile space */
            
            body.ar { direction: rtl; }
        }

        body.ar { font-family: var(--font-arabic); }
        body.ar .logo-sub { letter-spacing: 0; }
    </style>
</head>
<body class="en">

    <nav>

            <div class="logo-text">

        <div class="nav-right">
            <div class="social-icons">

    </nav>

    </div>

    <section id="main">
        <h1 class="hero-title" data-en="Visuals for the<br>Modern Aesthetic" data-ar="رؤية بصرية<br>للعصر الحديث">Visuals for the<br>Modern Aesthetic</h1>
        <div class="main-image-container lightbox-trigger">
            <img src="images/main.jpg" alt="Featured Visual">
        </div>

        <div class="grid-container">
            <!-- Product 1 -->
            <div class="work-card">
                <div class="work-img-box lightbox-trigger">
                    <img src="images/work1.jpg" alt="Midnight Series">
                </div>
                <div class="work-info">
                    <h3 class="work-title" data-en="Midnight Series" data-ar="سلسلة منتصف الليل">Midnight Series</h3>
                    <div class="order-options">
                        <label data-en="Dimension" data-ar="المقاس">Dimension</label>
                        <select>
                            <option>20 * 30 — $15</option>
                            <option>30 * 40 — $20</option>
                        </select>
                    </div>
                    <a href="https://instagram.com/orlume.lb" class="order-btn" data-en="Order" data-ar="اطلب">Order</a>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="work-card">
                <div class="work-img-box lightbox-trigger">
                    <img src="images/work2.jpg" alt="Acrylic Signage">
                </div>
                <div class="work-info">
                    <h3 class="work-title" data-en="Acrylic Signage" data-ar="لوحات أكرليك">Acrylic Signage</h3>
                    <div class="order-options">
                        <label data-en="Dimension" data-ar="المقاس">Dimension</label>
                        <select>
                            <option>20 * 30 — $15</option>
                            <option>30 * 40 — $20</option>
                        </select>
                    </div>
                    <a href="https://instagram.com/orlume.lb" class="order-btn" data-en="Order" data-ar="اطلب">Order</a>
                </div>
            </div>

            <!-- Product 3 (New) -->
            <div class="work-card">
                <div class="work-img-box lightbox-trigger">
                    <img src="images/work3.jpg" alt="Minimalist Frame">
                </div>
                <div class="work-info">
                    <h3 class="work-title" data-en="Minimalist Frame" data-ar="إطار بسيط">Minimalist Frame</h3>
                    <div class="order-options">
                        <label data-en="Dimension" data-ar="المقاس">Dimension</label>
                        <select>
                            <option>20 * 30 — $15</option>

                        </select>
                    </div>
                    <a href="https://instagram.com/orlume.lb" class="order-btn" data-en="Order" data-ar="اطلب">Order</a>
                </div>

            <!-- Product 4 (New) -->
            <div class="work-card">
                <div class="work-img-box lightbox-trigger">
                    <img src="images/work4.jpg" alt="Layered Art">

                    <a href="https://instagram.com/orlume.lb" class="order-btn" data-en="Order" data-ar="اطلب">Order</a>

        </div>
    </section>

    <footer>
        <img src="images/orlume.png" alt="Orlume Logo" class="footer-logo">
        <p class="rights-text">© 2026 ORLUME.LB | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');

        document.querySelectorAll('.lightbox-trigger img').forEach(img => {
            img.onclick = () => { 
                setTimeout(() => {
                    lightbox.style.display = 'flex'; 
                    lightboxImg.src = img.src; 
                }, 100); 
            };
        });

        closeBtn.onclick = () => lightbox.style.display = 'none';
        lightbox.onclick = (e) => { if(e.target !== lightboxImg) lightbox.style.display = 'none'; };

        const langBtn = document.getElementById('langBtn');
        let currentLang = 'en';
        langBtn.onclick = () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.body.className = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            langBtn.innerText = currentLang === 'en' ? 'عربي' : 'English';
            document.querySelectorAll('[data-en]').forEach(el => { 
                el.innerHTML = el.getAttribute(`data-${currentLang}`); 
            });
        };
    </script>
</body>
</html>
